<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>سامانه مدرسه‌یاب ابتدایی - ناحیه پنج مشهد مقدس</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;600;700&display=swap"
        rel="stylesheet">

</head>

    <div id="modal" class="modal-overlay">

    <div class="modal-box">

        <span class="modal-close" onclick="closeModal()">×</span>

        <div id="modal-content"></div>

    </div>

</div>
    
<body>

    <div class="container">

        <img
            src="logo.png"
            alt="لوگوی آموزش و پرورش"
            class="logo">

        <h1>سامانه مدرسه‌یاب ابتدایی</h1>

        <h2>ناحیه پنج مشهد مقدس</h2>

        <div class="search-box">

            <div class="form-group">

                <label>جنسیت دانش آموز</label>

                <select id="gender">

                    <option value="">انتخاب کنید</option>

                    <option value="پسرانه">پسرانه</option>

                    <option value="دخترانه">دخترانه</option>

                </select>

            </div>

            <div class="form-group">

                <label>پایه تحصیلی</label>

                <select id="grade">

                    <option value="">انتخاب کنید</option>

                    <option value="1">اول</option>

                    <option value="2">دوم</option>

                    <option value="3">سوم</option>

                    <option value="4">چهارم</option>

                    <option value="5">پنجم</option>

                    <option value="6">ششم</option>

                </select>

            </div>

            <div class="form-group">

                <label>نام کوچه محل سکونت</label>

                <input
                    type="text"
                    id="street"
                    placeholder="مثال: نبوت">

            </div>

            <div class="form-group">

                <label>شماره کوچه</label>

                <input
                    type="text"
                    id="number"
                    placeholder="مثال: 45">

            </div>

            <button id="searchBtn">

                🔍 جستجوی مدرسه

            </button>

        </div>

        <div id="result"></div>

        <footer class="footer">

            <a
                href="https://SHAD.IR/EBT_N1605"
                target="_blank"
                class="shad-link">

                <img
                    src="shad.png"
                    alt="کانال شاد"
                    class="shad-logo">

                <div>

                    <strong>کانال معاونت آموزش بنیادین ابتدایی</strong>

                    <br>

                    <span>@EBT_N1605</span>

                </div>

            </a>

        </footer>

    </div>

    <script src="js/utils.js"></script>

    <script src="js/render.js"></script>

    <script src="js/neighbors.js"></script>

    <script src="js/search.js"></script>

    <script src="js/app.js"></script>

</body>

</html>
